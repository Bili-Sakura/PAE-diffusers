stage_1:
  target: tokenizer.PAE
  params:
    encoder_cls: 'Dinov2withNorm'
    encoder_config_path: 'facebook/dinov2-with-registers-large'  # HuggingFace model id or local path
    encoder_input_size: 224
    encoder_params:
      dinov2_path: 'facebook/dinov2-with-registers-large'  # HuggingFace model id or local path
      normalize: true
    use_delta_encoder: true
    delta_depth: 6
    delta_cross: true
    fusion_mode: 'sft'
    latent_dim: 32  # 32, 64 or encoder_dim(no compressed)
    decoder_config_path: 'configs/decoder/ViTL'


eval:
  eval_interval: 2000000
  eval_model: true
  data_path: '/path/to/data/imagenet/val'
  reference_npz_path: '/path/to/imagenet_val_images.npz'
  metrics: ['psnr', 'ssim', 'rfid']
